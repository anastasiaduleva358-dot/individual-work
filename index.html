<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планировщик расписания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Планировщик расписания</h1>

        <form id="eventForm">
            <input type="text" id="title" placeholder="Название события">

            <input type="date" id="date">

            <select id="category">
                <option value="">Выберите категорию</option>
                <option value="Учёба">Учёба</option>
                <option value="Работа">Работа</option>
                <option value="Личное">Личное</option>
            </select>

            <textarea id="description" placeholder="Описание события"></textarea>

            <button type="submit">Добавить событие</button>
        </form>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Поиск по названию">

            <select id="filterCategory">
                <option value="all">Все категории</option>
                <option value="Учёба">Учёба</option>
                <option value="Работа">Работа</option>
                <option value="Личное">Личное</option>
            </select>

            <button id="sortBtn">Сортировать по дате</button>
        </div>

        <div id="errorMessage"></div>

        <div id="eventsList"></div>
    </div>

    <script type="module" src="js/app.js"></script>

</body>
</html>
